# Docker Compose for remote-df — run ON the remote x86-64 Linux host.
#
# Loopback-only ports (reach it via an SSH tunnel — see scripts/connect.sh),
# auto-restart, and saves persisted to a host directory on disk (bind mount).
#
# Classic edition (default — builds locally):
#   docker compose up -d --build
#
# Steam edition (builds on this host; SteamCMD needs native x86_64):
#   write the credential files first, then:
#   echo myuser > secrets/steam_user && echo mypass > secrets/steam_pass
#   echo ABC123 > secrets/steam_guard        # empty unless Steam Guard 2FA is on
#   docker compose up -d --build df-steam     # name the service (don't use --profile)
#
# Control panel (opt-in sidecar):
#   docker compose --profile panel up -d --build control-panel
#   (overrides: PANEL_PORT, DOCKER_HOST, BASE_PORT — see control-panel/README.md)
#
# Saves persist on disk at ${DF_SAVES_DIR:-./saves}; periodic backup tarballs at
# ${DF_BACKUPS_DIR:-./backups} (both relative to this file). Common overrides
# (env or .env file): DF_VERSION, GEOM, WEB_PORT, VNC_PORT, DF_SAVES_DIR,
# DF_BACKUPS_DIR, DF_CPUS, DF_MEMORY, BACKUP_INTERVAL, BACKUP_KEEP, DF_AUTOPAUSE.

x-common: &common
  restart: unless-stopped
  # Bound to 127.0.0.1 only — nothing is exposed publicly. Tunnel in via SSH.
  ports:
    - "127.0.0.1:${WEB_PORT:-6080}:6080"
    - "127.0.0.1:${VNC_PORT:-5900}:5900"
  volumes:
    # DF v50 stores saves in the XDG user-data dir, NOT the game folder's
    # data/save. The container runs as root, so that path is
    # /root/.local/share/Bay 12 Games/Dwarf Fortress/save. Bind a host directory
    # there so saves live on disk (easy to back up), not in a docker volume.
    # Long syntax because the target path contains spaces. Source is relative to
    # this compose file unless DF_SAVES_DIR is set to an absolute path.
    - type: bind
      source: "${DF_SAVES_DIR:-./saves}"
      target: "/root/.local/share/Bay 12 Games/Dwarf Fortress/save"
    # Periodic save-backup tarballs (browse/download at /backups).
    - type: bind
      source: "${DF_BACKUPS_DIR:-./backups}"
      target: /backups
  environment:
    GEOM: "${GEOM:-1280x800}"
    BACKUP_INTERVAL: "${BACKUP_INTERVAL:-1800}"
    BACKUP_KEEP: "${BACKUP_KEEP:-48}"
    DF_AUTOPAUSE: "${DF_AUTOPAUSE:-1}"
  # Keep a runaway dwarfort from taking down the host. Override via env.
  cpus: ${DF_CPUS:-2.0}
  mem_limit: ${DF_MEMORY:-3g}
  pids_limit: 512
  # Mark unhealthy if the web entrypoint stops responding.
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://localhost:6080/ >/dev/null || exit 1"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 40s
  stop_grace_period: 10s

services:
  # Classic edition (default): free download from Bay12 at build time (+ DFHack).
  df:
    <<: *common
    image: "${IMAGE:-remote-df:df-${DF_VERSION:-53_14}}"
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        DF_VERSION: "${DF_VERSION:-53_14}"
        DF_EDITION: classic

  # Steam edition: premium version via SteamCMD. Credentials are passed as
  # BuildKit secrets (files under ./secrets/) and never stored in the image.
  df-steam:
    <<: *common
    profiles: ["steam"]
    image: "remote-df:df-${DF_VERSION:-53_14}-steam"
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        DF_VERSION: "${DF_VERSION:-53_14}"
        DF_EDITION: steam
      secrets:
        - steam_user
        - steam_pass
        - steam_guard

  # Control-panel sidecar (opt-in): a Next.js UI that talks to the Docker daemon
  # to spawn/manage DF instances and mods/tilesets. Not started by default —
  # bring it up with:  docker compose --profile panel up -d --build control-panel
  # Reach it over an SSH tunnel:  ssh -N -L 7070:localhost:7070 <host>
  # See control-panel/README.md (esp. the DOCKER_HOST / remote-daemon notes).
  control-panel:
    profiles: ["panel"]
    build:
      context: ./control-panel
      dockerfile: Dockerfile
    image: remote-df-control-panel:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PANEL_PORT:-7070}:7070"
    environment:
      # Empty = local daemon via the mounted socket below. Point at a remote
      # daemon with tcp://host:2376 (+TLS) or ssh://user@host instead.
      DOCKER_HOST: "${DOCKER_HOST:-}"
      DOCKER_TLS_VERIFY: "${DOCKER_TLS_VERIFY:-}"
      DOCKER_CERT_PATH: "${DOCKER_CERT_PATH:-}"
      DOCKER_SSH_KEY: "${DOCKER_SSH_KEY:-}"
      DF_IMAGE: "${IMAGE:-remote-df:df-${DF_VERSION:-53_14}}"
      DATA_ROOT: /data
      BASE_PORT: "${BASE_PORT:-6090}"
      DF_CPUS: "${DF_CPUS:-2.0}"
      DF_MEMORY: "${DF_MEMORY:-3g}"
    volumes:
      # Uploaded mods/tilesets persist here (streamed into spawned instances).
      - ./control-panel/data:/data
      # Local-daemon access; unused when DOCKER_HOST points at a remote daemon.
      - /var/run/docker.sock:/var/run/docker.sock

secrets:
  steam_user:
    file: ./secrets/steam_user
  steam_pass:
    file: ./secrets/steam_pass
  steam_guard:
    file: ./secrets/steam_guard
